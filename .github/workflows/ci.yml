name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Core library tests (no napari required) — covers all supported Python versions
  test-core:
    name: Core tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-core-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-core-${{ matrix.python-version }}-

      - name: Install package (core dependencies only)
        run: pip install -e "."

      - name: Run core tests
        run: python -m unittest tests/test_postprocessing.py -v

  # Full tests including napari GUI widgets — napari requires Python >= 3.10
  test-gui:
    name: GUI tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-napari-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-napari-${{ matrix.python-version }}-

      - name: Install system Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libegl1 \
            libdbus-1-3

      - name: Install package (with napari)
        run: pip install -e ".[napari]"

      - name: Run all tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -v tests/
