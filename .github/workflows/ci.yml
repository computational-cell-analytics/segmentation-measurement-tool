name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Core library tests (no napari required) — covers all supported Python versions
  test-core:
    name: Core tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-core-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-core-${{ matrix.python-version }}-

      - name: Install package (core dependencies only)
        run: pip install -e "."

      - name: Run core tests
        run: python -m unittest tests/test_postprocessing.py -v

  # Full tests including napari GUI widgets — napari requires Python >= 3.10
  test-gui:
    name: GUI tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-napari-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-napari-${{ matrix.python-version }}-

      - name: Install system Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libegl1 \
            libdbus-1-3 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libopengl0 \
            libgles2-mesa-dev \
            mesa-utils

      - name: Install package (with napari and test dependencies)
        run: pip install -e ".[napari,test]" PyQt5

      - name: Run GUI tests
        env:
          QT_QPA_PLATFORM: offscreen
          LIBGL_ALWAYS_SOFTWARE: "1"
          PYTHONFAULTHANDLER: "1"
        run: pytest tests/test_widget.py tests/test_intensity_widget.py
